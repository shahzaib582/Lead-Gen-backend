  /api/notifications/events/session:
    post:
      tags: [Notifications]
      summary: Create short-lived SSE session (Bearer)
      description: |
        Returns `sid` (~5 min TTL) for `GET /api/notifications/events?sid=...`.
        Use with browser `EventSource` (no Authorization header on the stream).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session created; `data` includes `sid`, `expiresInSec`, `eventsUrl`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/notifications/events:
    get:
      tags: [Notifications]
      summary: Server-Sent Events stream for user notifications
      description: |
        Query `sid` from `POST /api/notifications/events/session`.
        Initial event `notifications_snapshot` includes `unreadCount`.
        New rows emit `notification` with full `notification` object.
        Types created by the API include `reply_received`, `email_failed`, `meeting_booked`, `outreach_finished`.
      security: []
      parameters:
        - name: sid
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream (`text/event-stream`)
          content:
            text/event-stream:
              schema:
                type: string
        '401':
