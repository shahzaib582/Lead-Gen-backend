  /api/campaigns/{id}/leads/{leadId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: leadId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [CampaignLeads]
      summary: Update a campaign lead
      description: All fields optional; include at least one property to change. `sent_at` must be ISO 8601 if provided.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                status:
                  $ref: '#/components/schemas/CampaignLeadStatus'
                sent_at:
                  type: string
                  format: date-time
                  nullable: true
                mail_template:
                  type: string
                  nullable: true
                  maxLength: 50000
                error_message:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags: [CampaignLeads]
      summary: Remove lead from campaign
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

