  /api/campaigns:
    get:
      tags: [Campaigns]
      summary: List campaigns (paginated)
      description: |
        Returns a slim campaign summary per row: `id`, `name`, `goal`, `run_mode`, `target_leads`, `status`,
        `sent_count`, `reply_rate` (0–1), and `reply_rate_percent` (0–100).
        Reply metrics are based on `campaign_leads` with `status=sent` and `reply_received=true`.
        Optional `search` matches campaign `name` or `goal` (case-insensitive).
      parameters:
        - in: query
          name: search
          schema:
            type: string
            maxLength: 200
          description: Filter by campaign name or goal (partial match).
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/CampaignStatus'
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated campaigns
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessPaginated'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    post:
      tags: [Campaigns]
      summary: Create campaign
      description: |
        Optional `status` defaults to `draft`. When `CAMPAIGN_ACTIVE_CREATE_AUTO_ASSIGN` is `1` or `true` and you create with `status: active` and `target_leads > 0`, the server randomly assigns up to `target_leads` from `leads_data` (respecting `lead_source`), skipping duplicates.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, goal, target_zone, call_to_action, run_mode]
              properties:
                name:
                  type: string
                  maxLength: 200
                goal:
                  type: string
                  maxLength: 500
                target_zone:
                  type: string
                  maxLength: 300
                call_to_action:
                  type: string
                  maxLength: 200
                run_mode:
                  $ref: '#/components/schemas/CampaignRunMode'
                target_tone:
                  $ref: '#/components/schemas/CampaignTargetTone'
                mail_training_instruction:
                  type: string
                  nullable: true
                mail_template_samples:
                  type: array
                  maxItems: 30
                  items:
                    $ref: '#/components/schemas/MailTemplateSample'
                target_leads:
                  type: integer
                  minimum: 0
                  description: Optional; non-negative integer.
                lead_source:
                  $ref: '#/components/schemas/LeadSource'
                sender_display_name:
                  type: string
                  maxLength: 120
                  description: Optional display name for MIME From and sign-off. Falls back to `users.name` when omitted.
                sender_address:
                  type: string
                  maxLength: 500
                  description: Optional signature line in email body. Falls back to `users.address` when omitted.
                sender_phone:
                  type: string
                  maxLength: 80
                  description: Optional signature line in email body. Falls back to `users.contact` when omitted.
                status:
                  $ref: '#/components/schemas/CampaignStatus'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignCreatedResponse'
              example:
                success: true
                message: Campaign created successfully.
                data:
                  campaign:
                    id: 22222222-3333-4444-5555-666666666666
                    user_id: 11111111-2222-3333-4444-555555555555
                    name: Q2 outbound
                    goal: Book 10 demos
                    target_zone: North America
                    call_to_action: Reply for a 15-min call
                    run_mode: manual
                    target_tone: Professional
                    mail_training_instruction: null
                    mail_template_samples: []
                    target_leads: 50
                    lead_source: both
                    status: draft
                    sender_display_name: null
                    sender_address: null
                    sender_phone: null
                    created_at: '2026-05-13T10:00:00.000Z'
                    updated_at: '2026-05-13T10:00:00.000Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

