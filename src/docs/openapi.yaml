        Each item includes `lead_name`, `lead_email`, and `lead_company` from `leads_data`
        (`lead_name` is `fullName`, then `firstName`, then `email`).
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/CampaignLeadStatus'
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated leads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessPaginated'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/campaigns/{id}/leads/bulk:
    post:
      tags: [CampaignLeads]
      summary: Bulk add leads
      description: |
        Allowed only when campaign `status` is `active`, `paused`, or `completed` (not `draft`).
        Use a single-item `leads` array to add one lead.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [leads]
              properties:
                leads:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items:
                    type: object
                    required: [lead_data_id]
                    properties:
                      lead_data_id:
                        type: string
      responses:
        '201':
          description: Bulk result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '400':
          description: Campaign is still `draft` (leads cannot be added)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/campaigns/{id}/leads/generate-templates:
    post:
      tags: [CampaignLeads]
      summary: Generate AI mail templates for campaign leads
      description: Optional body to target a single campaign lead row.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                campaign_lead_id:
                  type: string
                  format: uuid
                  nullable: true
      responses:
        '200':
          description: Generation summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/campaigns/{id}/leads/run:
    post:
      tags: [CampaignLeads]
      summary: Start manual campaign outreach (async)
      description: |
        For **`run_mode: manual`** campaigns that are **`active`** only.
        Validates the request, then starts template generation and Gmail sends **in the background**
        and returns **202** immediately.
        - **≤15 leads (default):** fast batch — ~2s between sends.
        - **>15 leads:** throttled — 3–5 minute delay between sends (same as workers).
        Response includes `showProgressBanner`, `userMessage`, and `estimatedDurationMinutes` for the UI.
        Subscribe to campaign SSE for `outreach_started`, `outreach_progress`, and `outreach_finished` events.
        Returns **400** with `code: CAMPAIGN_NOT_MANUAL` for auto campaigns (they run via workers on bulk add).
        Returns **400** with `code: CAMPAIGN_NOT_ACTIVE` when the campaign is not active.
        Requires a linked Google account (`GET /api/auth/google`).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Outreach accepted and running in the background
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              example:
                success: true
                message: Sending emails in batches. This process may take a few minutes. Please check back shortly.
                data:
                  campaignId: 11111111-2222-3333-4444-555555555555
                  status: processing
                  leadsQueued: 120
                  processingMode: background
                  batchMode: throttled
                  showProgressBanner: true
                  estimatedDurationMinutes: 485
                  delayBetweenEmailsSecondsMin: 180
                  delayBetweenEmailsSecondsMax: 300
                  userMessage: Sending emails in batches. This process may take a few minutes. Please check back shortly.
                  pollHint: Use campaign SSE events or refresh leads for live status.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Campaign not found or no pending leads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Not manual, not active, or Google not linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/leads/tester:
    post:
      tags: [Tester]
      summary: Tester - create a new lead
      description: |
        Creates a new row in `leads_data` only (no campaign attachment).
        Useful for QA flows where testers need fresh leads and can use those emails for manual testing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                fullName:
                  type: string
                  maxLength: 200
                  nullable: true
                firstName:
                  type: string
                  maxLength: 120
                  nullable: true
                company:
                  type: string
                  maxLength: 200
                  nullable: true
                title:
                  type: string
                  maxLength: 200
                  nullable: true
      responses:
        '201':
          description: Lead created in leads_data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/campaigns/{id}/leads/tester/follow-ups/run:
    post:
      tags: [Tester]
      summary: Tester - run follow-ups now (optional ignore waiting days)
      description: |
        Executes follow-up sends for a campaign immediately for QA.
        By default `ignoreWaitingDays=true`, so follow-ups are sent without waiting for due date.
        Optional filters:
        - `campaignLeadId` to target one campaign lead
        - `followUpId` to target one follow-up definition
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ignoreWaitingDays:
                  type: boolean
                  default: true
                campaignLeadId:
                  type: string
                  format: uuid
                  nullable: true
                followUpId:
                  type: string
                  format: uuid
                  nullable: true
      responses:
        '200':
          description: Follow-up run summary (`examined`, `sent`, `failed`, `skipped`, `results`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/campaigns/{id}/leads/send-emails:
    post:
      tags: [CampaignLeads]
      summary: Send campaign emails (Gmail)
      description: |
        Campaign must be **`active`**; otherwise **400** with `code: CAMPAIGN_NOT_ACTIVE`.
        Optional `campaign_lead_id` scopes to one lead. Optional `access_token` overrides the user's stored Google token.
        Rate limits and daily caps apply server-side.
        Between each send the server waits a random interval between **`MAIL_DELAY_MIN_MS`** and **`MAIL_DELAY_MAX_MS`** (defaults 3–5 minutes), same policy as the BullMQ mail worker.
        On Google auth failures, the JSON summary may include **`googleError`** (`code` + message) without exposing tokens.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                campaign_lead_id:
                  type: string
                  format: uuid
                  nullable: true
                access_token:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Send summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignSendEmailsResponse'
              example:
                success: true
                message: 2 email(s) sent, 0 failed, 0 skipped.
                data:
                  sent: 2
                  failed: 0
                  skipped: 0
                  tokensRefreshed: 1
                  total: 2
                  dailyLimitReached: false
                  alreadySentToday: 0
                  totalSentToday: 2
                  dailyLimit: 500
                  results:
                    - campaignLeadId: 33333333-4444-5555-6666-777777777777
                      status: sent
                      to: lead@example.com
                      subject: Hello
                      messageId: msg_abc123
                    - campaignLeadId: 44444444-5555-6666-7777-888888888888
                      status: sent
                      to: other@example.com
                      subject: Hello
                      messageId: msg_def456
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/campaigns/{id}/leads/{leadId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: leadId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [CampaignLeads]
      summary: Update a campaign lead
      description: All fields optional; include at least one property to change. `sent_at` must be ISO 8601 if provided.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                status:
                  $ref: '#/components/schemas/CampaignLeadStatus'
                sent_at:
                  type: string
                  format: date-time
                  nullable: true
                mail_template:
                  type: string
                  nullable: true
                  maxLength: 50000
                error_message:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags: [CampaignLeads]
      summary: Remove lead from campaign
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

