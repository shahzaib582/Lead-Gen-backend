# maintain this file when routes or response shapes change.
openapi: 3.0.3
info:
  title: Rapid AI API
  description: Rapid AI API is a RESTful API for managing leads and campaigns.
  version: 1.0.0
  contact:
    name: Rapid AI API

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.rapidai2x.com
    description: Production (Render)

tags:
  - name: Health
    description: Liveness.
  - name: Auth
    description: Email/password signup, OTP, login, tokens, logout.
  - name: GoogleAuth
    description: Google OAuth and ID-token login.
  - name: Dashboard
    description: Dashboard KPIs, performance chart, active campaigns, and recent activity.
  - name: Analytics
    description: Analytics screen — overview KPIs, campaign chart, comparison table, weekly bars, reply breakdown donut.
  - name: Notifications
    description: In-app notifications, FCM web push token registration, list, unread count, mark read, and SSE.
  - name: Campaigns
    description: Campaign CRUD and listing (authenticated).
  - name: CampaignLeads
    description: Campaign leads — bulk add (not in draft), templates, send, list, CRUD.
  - name: CampaignFollowUps
    description: Per-campaign follow-up cadence (name, waiting_days); CRUD under a campaign.
  - name: Tester
    description: Tester utilities for fast QA (create test lead, trigger follow-ups ignoring waiting days).
  - name: LeadsData
    description: Global leads pool search and fetch by id.
  - name: User
    description: Current user profile (GET / PATCH).
  - name: Meetings
    description: Lead Gen meetings stored in the database (not personal Google Calendar events).
  - name: Billing
    description: Stripe subscriptions, plans, checkout, portal, and payment methods.

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        JWT access token. Send as HTTP header Authorization Bearer (scheme bearer in Authorize).

  headers:
    X-Response-Time:
      description: Request duration on the server (e.g. `12.4ms`).
      schema:
        type: string
        example: "12.4ms"
    Server-Timing:
      description: Timing hint; includes `total;dur=<ms>`.
      schema:
        type: string
        example: 'total;dur=12.4'

  responses:
    Unauthorized:
      description: Missing or invalid Bearer access token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Request validation failed (body, query, or path parameters).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but not allowed — typically email not yet verified for Bearer routes.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded for this route or client.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    CampaignRunMode:
      type: string
      enum: [manual, scheduled, auto]
    CampaignTargetTone:
      type: string
      enum: [Friendly, Professional, Direct, Consultative]
      description: Voice for generated outreach emails; defaults to Professional when omitted on create.
    CampaignStatus:
      type: string
      enum: [draft, active, paused, completed]
    LeadSource:
      type: string
      enum: [new, old, both]
    MailTemplateSample:
      type: object
      description: >
        One reference email for generation (tone, structure, placeholders). At least one of subject, body, html, or text should be non-empty.
      properties:
        subject:
          type: string
          maxLength: 500
          nullable: true
        body:
          type: string
          maxLength: 50000
          nullable: true
        html:
          type: string
          maxLength: 50000
          nullable: true
        text:
          type: string
          maxLength: 50000
          nullable: true
    CampaignLeadStatus:
      type: string
      enum: [pending, template_generated, sent, failed, skipped]
    LeadsSortBy:
      type: string
      enum: [created_at, fullName, email, company, country, fitScore, dateAdded]
    SortOrder:
      type: string
      enum: [asc, desc]
    ErrorResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        code:
          type: string
          description: Optional machine-readable code (e.g. TOKEN_EXPIRED).
        stack:
          type: string
          description: Present only for non-operational errors in non-production.

    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          description: Arbitrary payload; shape varies by endpoint.

    Pagination:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    SuccessPaginated:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data, pagination]
          properties:
            data:
              type: array
              items: {}
            pagination:
              $ref: '#/components/schemas/Pagination'

    # ─── Typed success bodies (high-traffic / integration-critical) ─────────────

    UserRole:
      type: string
      enum: [user, superadmin]
      description: Always `user` from signup/API; set `superadmin` only in the database.

    UserPublic:
      type: object
      required: [id, email, isVerified, createdAt, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        isVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 from `users.created_at`.
        role:
          $ref: '#/components/schemas/UserRole'
        name:
          type: string
          nullable: true
        profilePic:
          type: string
          nullable: true
          description: Public Supabase Storage URL; set via POST /api/user/avatar (not PATCH/signup).
        address:
          type: string
          nullable: true
        contact:
          type: string
          nullable: true
          description: Phone or other contact string.
        timezone:
          type: string
          nullable: true
          description: Optional IANA timezone (e.g. America/New_York). Used when syncing meetings to Google Calendar; defaults to UTC when unset.
        notificationsEnabled:
          type: boolean
          description: When false, notifications are still saved but SSE and FCM push are not sent. Defaults to true.

    MeetingPublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
          nullable: true
        campaignLeadId:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        attendeeEmail:
          type: string
          format: email
          nullable: true
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        meetLink:
          type: string
          nullable: true
        googleEventId:
          type: string
          nullable: true
        status:
          type: string
          enum: [scheduled, cancelled, completed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MeUser:
      allOf:
        - $ref: '#/components/schemas/UserPublic'
        - type: object
          properties:
            googleAccessToken:
              type: string
              nullable: true
              description: Present when Google is linked — treat as secret.

    MeResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: User fetched successfully.
        data:
          type: object
          required: [user]
          properties:
            user:
              $ref: '#/components/schemas/MeUser'

    AuthLoginData:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
          description: >-
            Short-lived JWT. In requests send it as a Bearer token in the HTTP Authorization header
            (Swagger Authorize uses the token value only).
        refreshToken:
          type: string
          description: Opaque refresh token for `POST /api/auth/refresh`.
        user:
          $ref: '#/components/schemas/UserPublic'

    AuthLoginResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: Login successful.
        data:
          $ref: '#/components/schemas/AuthLoginData'

    AuthTokenPairData:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    AuthVerifyOtpResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: Email verified successfully.
        data:
          $ref: '#/components/schemas/AuthLoginData'

    AuthRefreshResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: Tokens refreshed successfully.
        data:
          $ref: '#/components/schemas/AuthTokenPairData'

    SignupResponseData:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    SignupResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: '#/components/schemas/SignupResponseData'

    AuthGoogleUser:
      allOf:
        - $ref: '#/components/schemas/UserPublic'
        - type: object
          required: [authProvider]
          properties:
            authProvider:
              type: string
              enum: [google]

    AuthGoogleLoginData:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/AuthGoogleUser'

    AuthGoogleLoginResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: Google authentication successful.
        data:
          $ref: '#/components/schemas/AuthGoogleLoginData'

    Campaign:
      type: object
      description: Campaign row as stored (snake_case columns from PostgreSQL/Supabase).
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        goal:
          type: string
        target_zone:
          type: string
        call_to_action:
          type: string
        run_mode:
          $ref: '#/components/schemas/CampaignRunMode'
        target_tone:
          $ref: '#/components/schemas/CampaignTargetTone'
        mail_training_instruction:
          type: string
          nullable: true
          description: Optional instructions for tone, voice, and constraints when generating emails.
        mail_template_samples:
          type: array
          maxItems: 30
          items:
            $ref: '#/components/schemas/MailTemplateSample'
          description: Example emails (subject/body/html/text) the model should emulate.
        target_leads:
          type: integer
        lead_source:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/LeadSource'
        status:
          $ref: '#/components/schemas/CampaignStatus'
        sender_display_name:
          type: string
          nullable: true
        sender_address:
          type: string
          nullable: true
        sender_phone:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CampaignFollowUp:
      type: object
      description: Follow-up step for a campaign (stored snake_case).
      properties:
        id:
          type: string
          format: uuid
        campaign_id:
          type: string
          format: uuid
        name:
          type: string
        waiting_days:
          type: integer
          minimum: 0
          maximum: 3650
          description: Calendar days after initial campaign email sent_at before this follow-up is due.
        body_template:
          type: string
          maxLength: 50000
          nullable: true
          description: |
            Plain-text email body. Optional leading `Subject:` line.
            Placeholders `{{firstName}}`, `{{fullName}}`, `{{email}}`.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AssignLeadsSummary:
      type: object
      description: Shape returned as `autoAssign` when `CAMPAIGN_ACTIVE_CREATE_AUTO_ASSIGN` is enabled on campaign create (random pool assignment).
      properties:
        inserted:
          type: array
          items:
            type: object
        duplicates:
          type: array
          items:
            type: string
        filters:
          type: object
          nullable: true
          properties:
            country:
              type: string
              nullable: true
            industry:
              type: string
              nullable: true
        leadSource:
          $ref: '#/components/schemas/LeadSource'
        totalRequested:
          type: integer
        totalAvailable:
          type: integer
        totalInserted:
          type: integer
        totalDuplicates:
          type: integer
        error:
          type: string
          description: Present when auto-assign on create failed.

    CampaignCreatedData:
      type: object
      required: [campaign]
      properties:
        campaign:
          $ref: '#/components/schemas/Campaign'
        autoAssign:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/AssignLeadsSummary'

    CampaignCreatedResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: Campaign created successfully.
        data:
          $ref: '#/components/schemas/CampaignCreatedData'

    CampaignActivationSummary:
      type: object
      properties:
        enqueued:
          type: integer
        skippedDuplicate:
          type: integer
        skippedWrongState:
          type: integer
        examined:
          type: integer
        note:
          type: string
          description: e.g. `already_active` when the campaign was already active.

    CampaignUpdateData:
      type: object
      required: [campaign]
      properties:
        campaign:
          $ref: '#/components/schemas/Campaign'
        activation:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CampaignActivationSummary'

    CampaignUpdateResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: Campaign updated successfully.
        data:
          $ref: '#/components/schemas/CampaignUpdateData'

    CampaignGetData:
      type: object
      required: [campaign]
      properties:
        campaign:
          $ref: '#/components/schemas/Campaign'

    CampaignGetResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: '#/components/schemas/CampaignGetData'

    GoogleErrorSummary:
      type: object
      properties:
        code:
          type: string
          example: GOOGLE_REFRESH_FAILED
        message:
          type: string

    CampaignSendEmailResultItem:
      type: object
      properties:
        campaignLeadId:
          type: string
          format: uuid
        status:
          type: string
          enum: [sent, failed, skipped]
        to:
          type: string
          format: email
        subject:
          type: string
        messageId:
          type: string
        reason:
          type: string
          description: When `status` is `skipped` (e.g. no email on lead).
        error:
          type: string
        fatalCode:
          type: string
          description: Machine-readable code when send failed.

    CampaignSendEmailsData:
      type: object
      required:
        - sent
        - failed
        - skipped
        - tokensRefreshed
        - total
        - dailyLimitReached
        - alreadySentToday
        - totalSentToday
        - dailyLimit
        - results
      properties:
        sent:
          type: integer
        failed:
          type: integer
        skipped:
          type: integer
        tokensRefreshed:
          type: integer
        total:
          type: integer
        dailyLimitReached:
          type: boolean
        alreadySentToday:
          type: integer
        totalSentToday:
          type: integer
        dailyLimit:
          type: integer
          example: 500
        results:
          type: array
          items:
            $ref: '#/components/schemas/CampaignSendEmailResultItem'
        googleError:
          description: Present when the server could not refresh Google credentials before a send attempt.
          nullable: true
          allOf:
            - $ref: '#/components/schemas/GoogleErrorSummary'

    CampaignSendEmailsResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: 2 email(s) sent, 0 failed, 0 skipped.
        data:
          $ref: '#/components/schemas/CampaignSendEmailsData'

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: OK
          headers:
            X-Response-Time:
              $ref: '#/components/headers/X-Response-Time'
            Server-Timing:
              $ref: '#/components/headers/Server-Timing'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok

  /api/auth/signup:
    post:
      tags: [Auth]
      summary: Register and send OTP email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  description: Normalized by the server (e.g. lowercasing rules from validator).
                password:
                  type: string
                  minLength: 8
                  description: |
                    Required rules: ≥8 characters, at least one uppercase, one lowercase, one digit, and one special character (non-alphanumeric).
                name:
                  type: string
                  maxLength: 200
                address:
                  type: string
                  maxLength: 500
                contact:
                  type: string
                  maxLength: 120
              description: |
                Role is always `user` from signup (`superadmin` is database-only). Ensure DB matches `sql/schema.sql` for profile columns.
      responses:
        '201':
          description: Created; check email for 6-digit OTP.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupResponse'
              example:
                success: true
                message: Account created. Check your email for your 6-digit verification code.
                data:
                  email: hamzaansari6060@gmail.com
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify email OTP and receive tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                  pattern: '^[0-9]{6}$'
                  minLength: 6
                  maxLength: 6
                  description: Six-digit numeric code from email.
      responses:
        '200':
          description: Verified; returns access + refresh tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyOtpResponse'
              example:
                success: true
                message: Email verified successfully.
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                  refreshToken: a1b2c3d4e5f678901234567890abcdef0123456789abcdef0123456789abcd
                  user:
                    id: 11111111-2222-3333-4444-555555555555
                    email: hamzaansari6060@gmail.com
                    isVerified: true
                    createdAt: '2026-05-04T11:44:20.112293+00:00'
                    role: user
                    name: null
                    profilePic: null
                    address: null
                    contact: null
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Already verified or invalid OTP state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      description: |
        If the account exists and the password is correct but email is not verified, returns **403**
        with `code: EMAIL_NOT_VERIFIED` and sends a fresh verification OTP to the email (same as resend-otp).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  description: Non-empty string (no strength check on login).
            example:
              email: hamzaansari6060@gmail.com
              password: SecureP@ss1
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
              example:
                success: true
                message: Login successful.
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                  refreshToken: a1b2c3d4e5f678901234567890abcdef0123456789abcdef0123456789abcd
                  user:
                    id: 11111111-2222-3333-4444-555555555555
                    email: hamzaansari6060@gmail.com
                    isVerified: true
                    createdAt: '2026-05-04T11:44:20.112293+00:00'
                    role: user
                    name: null
                    profilePic: null
                    address: null
                    contact: null
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Email not verified — a new OTP was sent (see `code` EMAIL_NOT_VERIFIED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: Email not verified. A new verification code has been sent to your email.
                code: EMAIL_NOT_VERIFIED
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/validate-otp:
    post:
      tags: [Auth]
      summary: Check OTP validity without consuming it
      description: |
        Validates the 6-digit code for the given email **without marking it used**.
        Wrong codes still count toward the max-attempt limit. Call `POST /api/auth/verify-otp`
        (signup) or `POST /api/auth/reset-password` (password reset) to finish the flow.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                  pattern: '^[0-9]{6}$'
                  minLength: 6
                  maxLength: 6
                purpose:
                  type: string
                  enum: [email_verify, password_reset]
                  default: email_verify
                  description: Defaults to signup email verification; use `password_reset` after forgot-password.
      responses:
        '200':
          description: OTP is valid and still usable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              example:
                success: true
                message: Verification code is valid.
                data:
                  valid: true
        '400':
          description: Invalid or expired code
        '404':
          description: User not found
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/resend-otp:
    post:
      tags: [Auth]
      summary: Resend email-verification OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: OTP resent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password-reset OTP by email
      security: []
      description: >-
        Sends a 6-digit password reset OTP when the account exists and has a password set.
        Returns 404 if no account exists for the email, or 400 for Google-only accounts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Password reset OTP sent to the user's email.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Google-only account (no password to reset)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No account found for this email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Set new password with email + reset OTP
      security: []
      description: |
        Revokes all refresh sessions. Returns a success message only — sign in with the new password to get tokens.
        Returns 422 if the new password matches the current password.
        The OTP stays valid for retry when only password validation fails (OTP is consumed after a successful reset).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp, password]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                  pattern: '^[0-9]{6}$'
                password:
                  type: string
                  minLength: 8
                  description: Same strength rules as signup.
      responses:
        '200':
          description: Password updated; sign in with the new password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Invalid or expired reset code / weak requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and get new access + refresh pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  description: Opaque refresh token string from prior login/verify/refresh response.
      responses:
        '200':
          description: New tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRefreshResponse'
              example:
                success: true
                message: Tokens refreshed successfully.
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                  refreshToken: b2c3d4e5f678901234567890abcdef0123456789abcdef0123456789abcdef0
        '400':
          description: Missing refresh token in body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or revoked refresh token, or user missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token (optional body)
      description: If `refreshToken` is omitted, the server still returns success but may not revoke a specific session.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /api/auth/logout-all:
    post:
      tags: [Auth]
      summary: Revoke all refresh tokens for the current user
      description: Requires valid access JWT.
      responses:
        '200':
          description: All sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/auth/google:
    get:
      tags: [GoogleAuth]
      summary: Start Google OAuth (redirect or JSON auth URL)
      description: Default returns 302 to Google. Use `?format=json` for `{ authUrl }` (e.g. Swagger). Or use `POST /api/auth/google/token`.
      security: []
      parameters:
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [json]
          description: When `json`, respond with `authUrl` in JSON instead of redirecting.
      responses:
        '302':
          description: Redirect to Google (when `format` is not `json`).
          headers:
            Location:
              description: Google OAuth authorization URL
              schema:
                type: string
                format: uri
        '200':
          description: When `format=json` — open `data.authUrl` in a browser to sign in with Google.
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    required: [authUrl]
                    properties:
                      authUrl:
                        type: string
                        format: uri
                        description: Same URL the 302 redirect would use.
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/google/callback:
    get:
      tags: [GoogleAuth]
      summary: Google OAuth callback (browser redirect flow)
      description: |
        Google redirects here with `?code=` after consent. Returns JSON token payload (not an HTML redirect to your SPA).
        Users who sign up or sign in with a Google-verified email are marked `isVerified: true` automatically (no OTP step).
      security: []
      parameters:
        - in: query
          name: code
          required: false
          schema:
            type: string
          description: Authorization code from Google (required unless `error` is set).
        - in: query
          name: error
          required: false
          schema:
            type: string
          description: OAuth error code from Google if the user denied access.
      responses:
        '200':
          description: JSON with accessToken, refreshToken, and user (API-style response).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Missing code, Google error query param, or unverified Google email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already registered with a different auth provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/google/token:
    post:
      tags: [GoogleAuth]
      summary: Exchange Google ID token for app JWT pair
      description: |
        Users who sign up or sign in with a Google-verified email are marked `isVerified: true` automatically (no OTP step).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_token]
              properties:
                id_token:
                  type: string
                  description: Google Sign-In ID token (JWT string from client SDK).
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthGoogleLoginResponse'
              example:
                success: true
                message: Google authentication successful.
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                  refreshToken: c3d4e5f678901234567890abcdef0123456789abcdef0123456789abcdef01
                  user:
                    id: 11111111-2222-3333-4444-555555555555
                    email: user@example.com
                    isVerified: true
                    createdAt: '2026-05-04T11:44:20.112293+00:00'
                    role: user
                    name: Example User
                    profilePic: https://lh3.googleusercontent.com/a/example
                    address: null
                    contact: null
                    authProvider: google
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/google/status:
    get:
      tags: [GoogleAuth]
      summary: Google link status for current user
      description: |
        Requires Bearer access token.
        `linked` is true only when Google APIs are usable (valid access token, or refresh succeeded).
        When the access token is expired and refresh fails or no refresh token exists,
        returns `linked: false`, `tokenExpired: true`, and `needsReconnect: true`.
      responses:
        '200':
          description: Google connection status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              example:
                success: true
                data:
                  linked: false
                  calendarLinked: false
                  tokenExpired: true
                  needsReconnect: true
                  email: user@gmail.com
                  name: Example User
                  avatarUrl: https://lh3.googleusercontent.com/a/example
                  scopes:
                    - https://www.googleapis.com/auth/gmail.send
                  tokenExpiresAt: '2026-05-22T23:21:24.352+00:00'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/user:
    get:
      tags: [User]
      summary: Current user profile
      description: |
        Requires Bearer access token. Returns profile from the database plus Google link status.
        `googleAccessToken` is included when Google is linked (treat as secret).
      responses:
        '200':
          description: User and Google status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      tags: [User]
      summary: Update current user profile
      description: |
        Update `name`, `address`, `contact`, `timezone`, or `notificationsEnabled`.
        Profile image uses POST/DELETE `/api/user/avatar` only (not `profilePic` here).
        To change `password`, send `oldPassword` (or `old_password`) and a new `password` (same strength rules as signup).
        New password must differ from the current one (422 if identical).
        Email and role cannot be changed here. Set `timezone` to `null` to clear.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  nullable: true
                address:
                  type: string
                  nullable: true
                contact:
                  type: string
                  nullable: true
                timezone:
                  type: string
                  nullable: true
                  description: IANA timezone (e.g. America/New_York) or null to clear.
                notificationsEnabled:
                  type: boolean
                  description: Enable or disable new in-app notifications.
                oldPassword:
                  type: string
                  description: Required when `password` is sent (current password).
                password:
                  type: string
                  description: New password (min 8 chars, upper, lower, number, special).
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Wrong current password when changing password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags: [User]
      summary: Soft-delete current user account
      description: |
        Sets `deleted_at` on the user, revokes all refresh tokens, and removes FCM push tokens.
        Login, Google sign-in, token refresh, and Bearer access are blocked afterward.
        Signup or Google registration with the same email returns 403 — contact support (account cannot be self-restored).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              example:
                success: true
                message: Account deleted successfully.
        '400':
          description: Account already deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/user/avatar:
    post:
      tags: [User]
      summary: Upload profile image
      description: |
        Multipart upload to Supabase Storage bucket `SUPABASE_STORAGE_BUCKET` (default `lead_generation_bucket`).
        Field name must be `image`. Max 10 MB; JPEG, PNG, or WebP. Replaces any existing avatar in storage.
        Saves full public URL on `users.profile_pic`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Uploaded; data.user.profilePic is the public URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: File larger than 10 MB
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags: [User]
      summary: Delete profile image
      description: Removes avatar object(s) from storage and clears profilePic on the user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/meetings:
    get:
      tags: [Meetings]
      summary: List Lead Gen meetings (database only)
      description: |
        Returns meetings created through this API. Personal Google Calendar events are not included.
        Dashboard metrics use the same `meetings` table.
        Before listing, scheduled meetings whose `end_at` is in the past are automatically marked `completed`.
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [scheduled, cancelled, completed]
        - in: query
          name: campaign_id
          schema:
            type: string
            format: uuid
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: Paginated meetings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Meetings]
      summary: Book a meeting (DB + optional Google Calendar)
      description: |
        Inserts a row in `meetings` (used for dashboard counts). When `sync_google` is true (default)
        and the user has granted `calendar.events`, creates a Google Calendar event with optional Meet link.
        Link a lead via `campaign_lead_id` to tie the booking to a campaign. Scheduling uses the user's
        `timezone` when set, otherwise UTC.
        `start_at` must not be in the past (422 `MEETING_PAST_DATETIME`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, start_at, end_at]
              properties:
                title:
                  type: string
                description:
                  type: string
                start_at:
                  type: string
                  format: date-time
                end_at:
                  type: string
                  format: date-time
                attendee_email:
                  type: string
                  format: email
                campaign_id:
                  type: string
                  format: uuid
                campaign_lead_id:
                  type: string
                  format: uuid
                sync_google:
                  type: boolean
                  default: true
                add_google_meet:
                  type: boolean
                  default: true
      responses:
        '201':
          description: Meeting created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/meetings/{id}:
    get:
      tags: [Meetings]
      summary: Get one meeting
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Meetings]
      summary: Update a meeting
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                start_at:
                  type: string
                  format: date-time
                end_at:
                  type: string
                  format: date-time
                attendee_email:
                  type: string
                  format: email
                status:
                  type: string
                  enum: [scheduled, completed]
      responses:
        '200':
          description: Updated
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Meetings]
      summary: Cancel a meeting
      description: Sets status to `cancelled` and removes the Google event when linked.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cancelled
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Dashboard KPI summary
      description: |
        Aggregate metrics for the authenticated user: total campaigns, **`total_leads`** (all rows in
        `campaign_leads` across the user's campaigns), total emails sent, reply rate, and
        `meeting_booking_count` (scheduled meetings in the `meetings` table only).
      responses:
        '200':
          description: Summary metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/dashboard/meeting-stats:
    get:
      tags: [Dashboard]
      summary: Meeting stats (week, month, conversion)
      description: |
        KPIs from the `meetings` table (non-cancelled, by `created_at`) and conversion vs campaign emails sent (`sent_at`).
        - **meetings_this_week** — count for current UTC week (Monday–Sunday) and **vs_last_week** (absolute change vs prior week).
        - **meetings_this_month** — count for current UTC calendar month and **vs_last_month_percent** (relative % change).
        - **conversion_rate** — meetings ÷ emails sent in the same month, as a percent (one decimal), and **vs_last_month_points** (percentage-point change vs prior month).
      responses:
        '200':
          description: Meeting stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              example:
                success: true
                data:
                  meetings_this_week:
                    count: 8
                    vs_last_week: 3
                  meetings_this_month:
                    count: 37
                    vs_last_month_percent: 12
                  conversion_rate:
                    percent: 4.4
                    vs_last_month_points: 0.6
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/analytics/overview:
    get:
      tags: [Analytics]
      summary: Analytics overview KPIs
      description: |
        Top cards for the Analytics screen: emails sent, reply rate, meetings booked, and open rate placeholder.
        Includes comparison vs the previous period of equal length (`vs_previous_period_*`).
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [last_7_days, last_30_days, last_month, last_90_days, this_month, custom]
            default: last_30_days
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Overview metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/analytics/campaign-chart:
    get:
      tags: [Analytics]
      summary: Campaign reply volume chart (multi-line)
      description: Daily reply counts per campaign for the selected date range.
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [last_7_days, last_30_days, last_month, last_90_days, this_month, custom]
            default: last_30_days
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Per-campaign time series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/analytics/campaign-comparison:
    get:
      tags: [Analytics]
      summary: Campaign comparison table (paginated)
      description: |
        Campaigns ordered by `updated_at` (newest first) with leads, emails sent, reply rate %, meetings,
        status label, and reply sparkline (last 14 reply days). `open_rate_percent` is null until open tracking exists.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        '200':
          description: Campaign rows with pagination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              example:
                success: true
                data:
                  campaigns: []
                  pagination:
                    page: 1
                    limit: 10
                    total: 7
                    totalPages: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/analytics/sent-vs-replies:
    get:
      tags: [Analytics]
      summary: Emails sent vs replies by week
      description: Grouped bar chart data for the last N UTC weeks (default 4).
      parameters:
        - in: query
          name: weeks
          schema:
            type: integer
            minimum: 1
            maximum: 12
            default: 4
      responses:
        '200':
          description: Weekly sent and reply counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/analytics/reply-breakdown:
    get:
      tags: [Analytics]
      summary: Reply breakdown (donut / circle chart)
      description: |
        Four segments for a circle graph: replies received, sent awaiting reply, in pipeline, failed/skipped.
        Percents sum to 100 over `total` in the selected period.
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [last_7_days, last_30_days, last_month, last_90_days, this_month, custom]
            default: last_30_days
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Breakdown segments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              example:
                success: true
                data:
                  period: last_30_days
                  total: 100
                  segments:
                    - key: replies_received
                      label: Replies received
                      count: 14
                      percent: 14
                    - key: sent_awaiting_reply
                      label: Sent — awaiting reply
                      count: 62
                      percent: 62
                    - key: in_pipeline
                      label: In pipeline (not sent)
                      count: 20
                      percent: 20
                    - key: failed_or_skipped
                      label: Failed / skipped
                      count: 4
                      percent: 4
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/notifications/push/status:
    get:
      tags: [Notifications]
      summary: Web push (FCM) status for current user
      description: Whether FCM is configured on the server and how many device tokens are registered.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: fcmConfigured and registeredDevices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/notifications/push/register:
    post:
      tags: [Notifications]
      summary: Register FCM token (web push)
      description: |
        Call after the browser obtains an FCM registration token (Firebase JS SDK + service worker).
        Requires server env FIREBASE_PROJECT_ID, FIREBASE_CLIENT_EMAIL, FIREBASE_PRIVATE_KEY.
        Tokens are stored regardless of notificationsEnabled. Push and live SSE are skipped when notificationsEnabled is false; notification rows are still saved.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fcmToken]
              properties:
                fcmToken:
                  type: string
                  description: FCM registration token from getToken() on the web client.
                deviceLabel:
                  type: string
                  nullable: true
                  description: Optional label (e.g. Chrome on MacBook).
      responses:
        '200':
          description: Token registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: FCM not configured on server
    delete:
      tags: [Notifications]
      summary: Unregister FCM token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fcmToken]
              properties:
                fcmToken:
                  type: string
      responses:
        '200':
          description: Token removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      description: Paginated notifications for the authenticated user. Use `unread=true` for unread only.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - in: query
          name: unread
          schema:
            type: string
            enum: ['true', 'false', '1', '0']
      responses:
        '200':
          description: Response data includes items and pagination.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/notifications/unread-count:
