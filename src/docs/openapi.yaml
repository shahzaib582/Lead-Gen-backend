# maintain this file when routes or response shapes change.
openapi: 3.0.3
info:
  title: Lead Gen API
  description: |
    Auth, campaigns, leads, and email flows for the Lead Gen backend.

    **Where the API lives**
    - **Development:** `http://localhost:3000` — JSON routes are under `/api` (example: `POST /api/auth/login`). Liveness: `GET /health` (no `/api` prefix).
    - **Production (Render):** `https://leadgen-api-xct7.onrender.com` — same paths (example: `https://leadgen-api-xct7.onrender.com/api/auth/login`).

    **Authentication**
    Default security is HTTP Bearer (JWT access token). In Swagger UI use **Authorize** and paste only the token value, or send header `Authorization: Bearer <accessToken>`.
    Tokens come from `POST /api/auth/login`, `POST /api/auth/verify-otp`, `POST /api/auth/refresh`, or Google flows.
    Bearer-protected routes return **403** when the account exists but **email is not verified** (same shape as other errors).

    **Requests**
    Send JSON bodies with header `Content-Type: application/json` unless noted otherwise.

    **Rate limits**
    Some routes return **429** with `{ success: false, message }` when limits are exceeded (auth, Google, campaigns, etc.).

    **Campaign mail timing**
    Sequential sends (BullMQ mail worker and the HTTP `send-emails` loop) use a random delay between **`MAIL_DELAY_MIN_MS`** and **`MAIL_DELAY_MAX_MS`** (defaults **180000–300000** ms, i.e. 3–5 minutes). Override only when you understand deliverability trade-offs.

    **Campaign SSE (progress)**
    Workers publish progress to Redis; the web process streams **Server-Sent Events** at `GET /api/campaigns/{id}/events?sid=...`. Create a short-lived session with **`POST /api/campaigns/{id}/events/session`** (Bearer). The `sid` is secret—treat like a password. Cross-origin `EventSource` can use the query `sid` without cookies if `CORS_ORIGIN` includes your frontend origin.

    **Create with `status: active`**
    By default, creating an active campaign does **not** auto-assign leads. Set **`CAMPAIGN_ACTIVE_CREATE_AUTO_ASSIGN=1`** (or `true`) to opt in: when `status` is `active` and `target_leads > 0`, the server runs the same assignment as random-assign after insert.

    **Docs:** Swagger UI `/api/docs` · OpenAPI YAML `/api/openapi.yaml`
  version: 1.0.0
  contact:
    name: Lead Gen API

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://leadgen-api-xct7.onrender.com
    description: Production (Render)

tags:
  - name: Health
    description: Process health and machine-readable spec.
  - name: Docs
    description: Swagger UI entry (HTML).
  - name: Auth
    description: Email/password signup, OTP, login, tokens, logout.
  - name: GoogleAuth
    description: Google OAuth redirect, callback, ID-token exchange, link status.
  - name: Campaigns
    description: Campaign CRUD and listing (authenticated).
  - name: CampaignLeads
    description: Leads attached to a campaign — assign, templates, send, CRUD.
  - name: Emails
    description: One-off send via user Gmail token.
  - name: LeadsData
    description: Global leads pool search and fetch by id.
  - name: Me
    description: Current user from access JWT.

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Short-lived access JWT. Obtain via email auth (`/api/auth/login`, `/api/auth/verify-otp`, `/api/auth/refresh`) or Google (`/api/auth/google/token` or callback).
        Send as: `Authorization: Bearer <accessToken>`.

  responses:
    Unauthorized:
      description: Missing or invalid Bearer access token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Request validation failed (body, query, or path parameters).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but not allowed — typically email not yet verified for Bearer routes.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded for this route or client.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    CampaignRunMode:
      type: string
      enum: [manual, scheduled, auto]
    CampaignStatus:
      type: string
      enum: [draft, active, paused, completed]
    LeadSource:
      type: string
      enum: [new, old, both]
    CampaignLeadStatus:
      type: string
      enum: [pending, template_generated, sent, failed, skipped]
    LeadsSortBy:
      type: string
      enum: [created_at, fullName, email, company, country, fitScore, dateAdded]
    SortOrder:
      type: string
      enum: [asc, desc]
    ErrorResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        code:
          type: string
          description: Optional machine-readable code (e.g. TOKEN_EXPIRED).
        stack:
          type: string
          description: Present only for non-operational errors in non-production.

    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          description: Arbitrary payload; shape varies by endpoint.

    Pagination:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    SuccessPaginated:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data, pagination]
          properties:
            data:
              type: array
              items: {}
            pagination:
              $ref: '#/components/schemas/Pagination'

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok

  /api/openapi.yaml:
    get:
      tags: [Health]
      summary: Raw OpenAPI document (this file)
      security: []
      responses:
        '200':
          description: YAML document
          content:
            application/yaml:
              schema:
                type: string

  /api/docs:
    get:
      tags: [Docs]
      summary: Swagger UI (interactive API documentation)
      security: []
      description: Serves HTML; static assets load from the same `/api/docs/` path prefix.
      responses:
        '200':
          description: Swagger UI page (HTML)
          content:
            text/html:
              schema:
                type: string

  /api/auth/signup:
    post:
      tags: [Auth]
      summary: Register and send OTP email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  description: Normalized by the server (e.g. lowercasing rules from validator).
                password:
                  type: string
                  minLength: 8
                  description: |
                    Required rules: ≥8 characters, at least one uppercase, one lowercase, one digit, and one special character (non-alphanumeric).
      responses:
        '201':
          description: Created; check email for 6-digit OTP.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify email OTP and receive tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, otp]
              properties:
                userId:
                  type: string
                  format: uuid
                otp:
                  type: string
                  pattern: '^[0-9]{6}$'
                  minLength: 6
                  maxLength: 6
                  description: Six-digit numeric code from email.
      responses:
        '200':
          description: Verified; returns access + refresh tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Already verified or invalid OTP state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  description: Non-empty string (no strength check on login).
            example:
              email: hamzaansari6060@gmail.com
              password: SecureP@ss1
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Email not verified yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/resend-otp:
    post:
      tags: [Auth]
      summary: Resend verification OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: OTP resent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and get new access + refresh pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  description: Opaque refresh token string from prior login/verify/refresh response.
      responses:
        '200':
          description: New tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Missing refresh token in body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or revoked refresh token, or user missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token (optional body)
      description: If `refreshToken` is omitted, the server still returns success but may not revoke a specific session.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /api/auth/logout-all:
    post:
      tags: [Auth]
      summary: Revoke all refresh tokens for the current user
      description: Requires valid access JWT.
      responses:
        '200':
          description: All sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/auth/google:
    get:
      tags: [GoogleAuth]
      summary: Redirect to Google OAuth consent
      security: []
      responses:
        '302':
          description: Redirect to Google authorization URL (`Location` header).
        '429':
          description: Too many Google auth starts (per-IP rate limit on this route).

  /api/auth/google/callback:
    get:
      tags: [GoogleAuth]
      summary: Google OAuth callback (browser redirect flow)
      description: Google redirects here with `?code=` after consent. Returns JSON token payload (not an HTML redirect to your SPA).
      security: []
      parameters:
        - in: query
          name: code
          required: false
          schema:
            type: string
          description: Authorization code from Google (required unless `error` is set).
        - in: query
          name: error
          required: false
          schema:
            type: string
          description: OAuth error code from Google if the user denied access.
      responses:
        '200':
          description: JSON with accessToken, refreshToken, and user (API-style response).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Missing code, Google error query param, or unverified Google email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already registered with a different auth provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/google/token:
    post:
      tags: [GoogleAuth]
      summary: Exchange Google ID token for app JWT pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_token]
              properties:
                id_token:
                  type: string
                  description: Google Sign-In ID token (JWT string from client SDK).
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/google/status:
    get:
      tags: [GoogleAuth]
      summary: Google link status for current user
      description: Requires Bearer access token.
      responses:
        '200':
          description: Linked or not
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/me:
    get:
      tags: [Me]
      summary: Current user (from access token)
      description: Requires Bearer access token. Returns `data.user` from JWT payload.
      responses:
        '200':
          description: User payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/campaigns:
    get:
      tags: [Campaigns]
      summary: List campaigns (paginated)
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/CampaignStatus'
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated campaigns
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessPaginated'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    post:
      tags: [Campaigns]
      summary: Create campaign
      description: |
        Optional `status` defaults to `draft`. When `CAMPAIGN_ACTIVE_CREATE_AUTO_ASSIGN` is `1` or `true` and you create with `status: active` and `target_leads > 0`, the server auto-assigns leads like random-assign.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, goal, target_zone, call_to_action, run_mode]
              properties:
                name:
                  type: string
                  maxLength: 200
                goal:
                  type: string
                  maxLength: 500
                target_zone:
                  type: string
                  maxLength: 300
                call_to_action:
                  type: string
                  maxLength: 200
                run_mode:
                  $ref: '#/components/schemas/CampaignRunMode'
                mail_template:
                  type: string
                  nullable: true
                example_training:
                  type: string
                  nullable: true
                target_leads:
                  type: integer
                  minimum: 0
                  description: Optional; non-negative integer.
                lead_source:
                  $ref: '#/components/schemas/LeadSource'
                sender_display_name:
                  type: string
                  maxLength: 120
                  description: Optional display name for MIME From (paired with linked Gmail address).
                sender_reply_to:
                  type: string
                  format: email
                  description: Optional Reply-To header for campaign sends.
                sender_address:
                  type: string
                  maxLength: 500
                  description: Optional line appended to message body as a signature block.
                sender_phone:
                  type: string
                  maxLength: 80
                  description: Optional line appended to message body as a signature block.
                status:
                  $ref: '#/components/schemas/CampaignStatus'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/campaigns/{id}/events/session:
    post:
      tags: [Campaigns]
      summary: Create short-lived SSE session (Bearer)
      description: |
        Returns an opaque `sid` (~5 minute TTL in Redis) used with `GET /api/campaigns/{id}/events?sid=...`.
        Requires Bearer JWT and campaign ownership.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session created; `data` includes `sid`, `expiresInSec`, and `eventsUrl`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Campaign not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/campaigns/{id}/events:
    get:
      tags: [Campaigns]
      summary: Server-Sent Events stream for campaign progress
      description: |
        Query `sid` from `POST .../events/session`. No Bearer header required—the `sid` binds to the owning user and campaign.
        Initial event `campaign_progress` is a snapshot; subsequent events mirror Redis payloads (`template_started`, `template_done`, `mail_sent`, `mail_failed`, etc.).
        Comment heartbeats (`: ping`) arrive about every 15 seconds.
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: sid
          in: query
          required: true
          schema:
            type: string
          description: Opaque session id from POST `/events/session`.
      responses:
        '200':
          description: SSE stream (`text/event-stream`)
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          description: Invalid or expired `sid`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/campaigns/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Campaigns]
      summary: Get one campaign
      responses:
        '200':
          description: Campaign
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    patch:
      tags: [Campaigns]
      summary: Partial update campaign
      description: |
        All body fields optional; when present they must satisfy the same constraints as create (non-empty strings where applicable).
        Setting `status` to `active` when the campaign was not already active enqueues template-generation jobs for leads that are `pending` with an empty `mail_template` (see activation behavior in product docs).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:
                  type: string
                  maxLength: 200
                goal:
                  type: string
                  maxLength: 500
                target_zone:
                  type: string
                  maxLength: 300
                call_to_action:
                  type: string
                  maxLength: 200
                run_mode:
                  $ref: '#/components/schemas/CampaignRunMode'
                mail_template:
                  type: string
                  nullable: true
                example_training:
                  type: string
                  nullable: true
                target_leads:
                  type: integer
                  minimum: 0
                lead_source:
                  $ref: '#/components/schemas/LeadSource'
                sender_display_name:
                  type: string
                  maxLength: 120
                  nullable: true
                sender_reply_to:
                  type: string
                  format: email
                  nullable: true
                sender_address:
                  type: string
                  maxLength: 500
                  nullable: true
                sender_phone:
                  type: string
                  maxLength: 80
                  nullable: true
                status:
                  $ref: '#/components/schemas/CampaignStatus'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags: [Campaigns]
      summary: Delete campaign
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/campaigns/{id}/leads:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [CampaignLeads]
      summary: List campaign leads (paginated)
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/CampaignLeadStatus'
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated leads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessPaginated'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    post:
      tags: [CampaignLeads]
      summary: Add one lead to campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lead_data_id]
              properties:
                lead_data_id:
                  type: string
                  description: Identifier from `leads_data` (string; not necessarily UUID).
                mail_template:
                  type: string
                  nullable: true
                  maxLength: 50000
      responses:
        '201':
          description: Lead added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/campaigns/{id}/leads/bulk:
    post:
      tags: [CampaignLeads]
      summary: Bulk add leads
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [leads]
              properties:
                leads:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items:
                    type: object
                    required: [lead_data_id]
                    properties:
                      lead_data_id:
                        type: string
                      mail_template:
                        type: string
                        nullable: true
                        maxLength: 50000
      responses:
        '201':
          description: Bulk result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/campaigns/{id}/leads/assign-random:
    post:
      tags: [CampaignLeads]
      summary: Assign random leads from pool
      description: No request body. Uses campaign `target_leads` (and duplicate checks) server-side.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Assignment result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/campaigns/{id}/leads/assign-filtered:
    post:
      tags: [CampaignLeads]
      summary: Assign leads filtered by country/industry
      description: |
        At least one of `country` or `industry` must be provided.
        Results are further restricted by the campaign's `lead_source` (`new` / `old` / `both` via `leads_data.outreachStatus`), intersected with country/industry filters.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: At least one of `country` or `industry` must be non-empty after trim (validated in service).
              properties:
                country:
                  type: string
                  maxLength: 100
                  nullable: true
                industry:
                  type: string
                  maxLength: 100
                  nullable: true
                limit:
                  type: integer
                  minimum: 1
                  maximum: 500
                  nullable: true
      responses:
        '201':
          description: Assignment result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Neither country nor industry provided, or invalid limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: No matching rows in `leads_data` for the filters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/campaigns/{id}/leads/generate-templates:
    post:
      tags: [CampaignLeads]
      summary: Generate AI mail templates for campaign leads
      description: Optional body to target a single campaign lead row.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                campaign_lead_id:
                  type: string
                  format: uuid
                  nullable: true
      responses:
        '200':
          description: Generation summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/campaigns/{id}/leads/send-emails:
    post:
      tags: [CampaignLeads]
      summary: Send campaign emails (Gmail)
      description: |
        Optional `campaign_lead_id` scopes to one lead. Optional `access_token` overrides the user's stored Google token.
        Rate limits and daily caps apply server-side.
        Between each send the server waits a random interval between **`MAIL_DELAY_MIN_MS`** and **`MAIL_DELAY_MAX_MS`** (defaults 3–5 minutes), same policy as the BullMQ mail worker.
        On Google auth failures, the JSON summary may include **`googleError`** (`code` + message) without exposing tokens.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                campaign_lead_id:
                  type: string
                  format: uuid
                  nullable: true
                access_token:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Send summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/campaigns/{id}/leads/{leadId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: leadId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [CampaignLeads]
      summary: Update a campaign lead
      description: All fields optional; include at least one property to change. `sent_at` must be ISO 8601 if provided.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                status:
                  $ref: '#/components/schemas/CampaignLeadStatus'
                sent_at:
                  type: string
                  format: date-time
                  nullable: true
                mail_template:
                  type: string
                  nullable: true
                  maxLength: 50000
                error_message:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags: [CampaignLeads]
      summary: Remove lead from campaign
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/emails/send:
    post:
      tags: [Emails]
      summary: Send email via Gmail API (user Google token)
      description: Requires Bearer access token. Uses the authenticated user's Google credentials unless you implement otherwise in the controller.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, subject, body]
              properties:
                to:
                  oneOf:
                    - type: string
                      description: Single recipient; must contain `@`.
                    - type: array
                      minItems: 1
                      items:
                        type: string
                        description: Each string must contain `@`.
                subject:
                  type: string
                  maxLength: 200
                body:
                  type: string
                  maxLength: 10000
                html:
                  type: string
                  maxLength: 50000
                  description: Optional HTML part; size capped server-side.
      responses:
        '200':
          description: Sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

