        - in: query
          name: from
          schema:
            type: string
            format: date
          description: Required when `period=custom` (YYYY-MM-DD).
        - in: query
          name: to
          schema:
            type: string
            format: date
          description: Required when `period=custom` (YYYY-MM-DD).
      responses:
        '200':
          description: Time series for chart
          content:
            application/json:
