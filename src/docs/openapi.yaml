          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/dashboard/performance:
    get:
      tags: [Dashboard]
      summary: Campaign performance time series (chart)
      description: |
        Triple-line chart data: `sent`, `replies`, and `bookings` (scheduled meetings by `start_at` from DB).
        One row per UTC day in the selected range.
      parameters:
        - in: query
