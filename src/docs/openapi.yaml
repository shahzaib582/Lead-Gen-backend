# maintain this file when routes or response shapes change.
openapi: 3.0.3
info:
  title: Lead Gen API
  description: Lead Gen API is a RESTful API for managing leads and campaigns.
  version: 1.0.0
  contact:
    name: Lead Gen API

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://leadgen-api-xct7.onrender.com
    description: Production (Render)

tags:
  - name: Health
    description: Liveness.
  - name: Auth
    description: Email/password signup, OTP, login, tokens, logout.
  - name: GoogleAuth
    description: Google OAuth and ID-token login.
  - name: Campaigns
    description: Campaign CRUD and listing (authenticated).
  - name: CampaignLeads
    description: Campaign leads — bulk add (not in draft), templates, send, list, CRUD.
  - name: CampaignFollowUps
    description: Per-campaign follow-up cadence (name, waiting_days); CRUD under a campaign.
  - name: LeadsData
    description: Global leads pool search and fetch by id.
  - name: Me
    description: Current user from access JWT.

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        JWT access token. Send as HTTP header Authorization Bearer (scheme bearer in Authorize).

  headers:
    X-Response-Time:
      description: Request duration on the server (e.g. `12.4ms`).
      schema:
        type: string
        example: "12.4ms"
    Server-Timing:
      description: Timing hint; includes `total;dur=<ms>`.
      schema:
        type: string
        example: 'total;dur=12.4'

  responses:
    Unauthorized:
      description: Missing or invalid Bearer access token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Request validation failed (body, query, or path parameters).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but not allowed — typically email not yet verified for Bearer routes.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded for this route or client.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    CampaignRunMode:
      type: string
      enum: [manual, scheduled, auto]
    CampaignTargetTone:
      type: string
      enum: [Friendly, Professional, Direct, Consultative]
      description: Voice for generated outreach emails; defaults to Professional when omitted on create.
    CampaignStatus:
      type: string
      enum: [draft, active, paused, completed]
    LeadSource:
      type: string
      enum: [new, old, both]
    MailTemplateSample:
      type: object
      description: >
        One reference email for generation (tone, structure, placeholders). At least one of subject, body, html, or text should be non-empty.
      properties:
        subject:
          type: string
          maxLength: 500
          nullable: true
        body:
          type: string
          maxLength: 50000
          nullable: true
        html:
          type: string
          maxLength: 50000
          nullable: true
        text:
          type: string
          maxLength: 50000
          nullable: true
    CampaignLeadStatus:
      type: string
      enum: [pending, template_generated, sent, failed, skipped]
    LeadsSortBy:
      type: string
      enum: [created_at, fullName, email, company, country, fitScore, dateAdded]
    SortOrder:
      type: string
      enum: [asc, desc]
    ErrorResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        code:
          type: string
          description: Optional machine-readable code (e.g. TOKEN_EXPIRED).
        stack:
          type: string
          description: Present only for non-operational errors in non-production.

    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          description: Arbitrary payload; shape varies by endpoint.

    Pagination:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    SuccessPaginated:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data, pagination]
          properties:
            data:
              type: array
              items: {}
            pagination:
              $ref: '#/components/schemas/Pagination'

    # ─── Typed success bodies (high-traffic / integration-critical) ─────────────

    UserRole:
      type: string
      enum: [user, superadmin]
      description: Always `user` from signup/API; set `superadmin` only in the database.

    UserPublic:
      type: object
      required: [id, email, isVerified, createdAt, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        isVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 from `users.created_at`.
        role:
          $ref: '#/components/schemas/UserRole'
        name:
          type: string
          nullable: true
        profilePic:
          type: string
          nullable: true
          description: URL or path to profile image.
        address:
          type: string
          nullable: true
        contact:
          type: string
          nullable: true
          description: Phone or other contact string.

    MeUser:
      allOf:
        - $ref: '#/components/schemas/UserPublic'
        - type: object
          properties:
            googleAccessToken:
              type: string
              nullable: true
              description: Present when Google is linked — treat as secret.

    MeResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: User fetched successfully.
        data:
          type: object
          required: [user]
          properties:
            user:
              $ref: '#/components/schemas/MeUser'

    AuthLoginData:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
          description: >-
            Short-lived JWT. In requests send it as a Bearer token in the HTTP Authorization header
            (Swagger Authorize uses the token value only).
        refreshToken:
          type: string
          description: Opaque refresh token for `POST /api/auth/refresh`.
        user:
          $ref: '#/components/schemas/UserPublic'

    AuthLoginResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: Login successful.
        data:
          $ref: '#/components/schemas/AuthLoginData'

    AuthTokenPairData:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    AuthVerifyOtpResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: Email verified successfully.
        data:
          $ref: '#/components/schemas/AuthLoginData'

    AuthRefreshResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: Tokens refreshed successfully.
        data:
          $ref: '#/components/schemas/AuthTokenPairData'

    SignupResponseData:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    SignupResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: '#/components/schemas/SignupResponseData'

    AuthGoogleUser:
      allOf:
        - $ref: '#/components/schemas/UserPublic'
        - type: object
          required: [authProvider]
          properties:
            authProvider:
              type: string
              enum: [google]

    AuthGoogleLoginData:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/AuthGoogleUser'

    AuthGoogleLoginResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: Google authentication successful.
        data:
          $ref: '#/components/schemas/AuthGoogleLoginData'

    Campaign:
      type: object
      description: Campaign row as stored (snake_case columns from PostgreSQL/Supabase).
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        goal:
          type: string
        target_zone:
          type: string
        call_to_action:
          type: string
        run_mode:
          $ref: '#/components/schemas/CampaignRunMode'
        target_tone:
          $ref: '#/components/schemas/CampaignTargetTone'
        mail_training_instruction:
          type: string
          nullable: true
          description: Optional instructions for tone, voice, and constraints when generating emails.
        mail_template_samples:
          type: array
          maxItems: 30
          items:
            $ref: '#/components/schemas/MailTemplateSample'
          description: Example emails (subject/body/html/text) the model should emulate.
        target_leads:
          type: integer
        lead_source:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/LeadSource'
        status:
          $ref: '#/components/schemas/CampaignStatus'
        sender_display_name:
          type: string
          nullable: true
        sender_address:
          type: string
          nullable: true
        sender_phone:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CampaignFollowUp:
      type: object
      description: Follow-up step for a campaign (stored snake_case).
      properties:
        id:
          type: string
          format: uuid
        campaign_id:
          type: string
          format: uuid
        name:
          type: string
        waiting_days:
          type: integer
          minimum: 0
          maximum: 3650
          description: Days after the previous touch before this follow-up runs.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AssignLeadsSummary:
      type: object
      description: Shape returned as `autoAssign` when `CAMPAIGN_ACTIVE_CREATE_AUTO_ASSIGN` is enabled on campaign create (random pool assignment).
      properties:
        inserted:
          type: array
          items:
            type: object
        duplicates:
          type: array
          items:
            type: string
        filters:
          type: object
          nullable: true
          properties:
            country:
              type: string
              nullable: true
            industry:
              type: string
              nullable: true
        leadSource:
          $ref: '#/components/schemas/LeadSource'
        totalRequested:
          type: integer
        totalAvailable:
          type: integer
        totalInserted:
          type: integer
        totalDuplicates:
          type: integer
        error:
          type: string
          description: Present when auto-assign on create failed.

    CampaignCreatedData:
      type: object
      required: [campaign]
      properties:
        campaign:
          $ref: '#/components/schemas/Campaign'
        autoAssign:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/AssignLeadsSummary'

    CampaignCreatedResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: Campaign created successfully.
        data:
          $ref: '#/components/schemas/CampaignCreatedData'

    CampaignActivationSummary:
      type: object
      properties:
        enqueued:
          type: integer
        skippedDuplicate:
          type: integer
        skippedWrongState:
          type: integer
        examined:
          type: integer
        note:
          type: string
          description: e.g. `already_active` when the campaign was already active.

    CampaignUpdateData:
      type: object
      required: [campaign]
      properties:
        campaign:
          $ref: '#/components/schemas/Campaign'
        activation:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CampaignActivationSummary'

    CampaignUpdateResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: Campaign updated successfully.
        data:
          $ref: '#/components/schemas/CampaignUpdateData'

    CampaignGetData:
      type: object
      required: [campaign]
      properties:
        campaign:
          $ref: '#/components/schemas/Campaign'

    CampaignGetResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: '#/components/schemas/CampaignGetData'

    GoogleErrorSummary:
      type: object
      properties:
        code:
          type: string
          example: GOOGLE_REFRESH_FAILED
        message:
          type: string

    CampaignSendEmailResultItem:
      type: object
      properties:
        campaignLeadId:
          type: string
          format: uuid
        status:
          type: string
          enum: [sent, failed, skipped]
        to:
          type: string
          format: email
        subject:
          type: string
        messageId:
          type: string
        reason:
          type: string
          description: When `status` is `skipped` (e.g. no email on lead).
        error:
          type: string
        fatalCode:
          type: string
          description: Machine-readable code when send failed.

    CampaignSendEmailsData:
      type: object
      required:
        - sent
        - failed
        - skipped
        - tokensRefreshed
        - total
        - dailyLimitReached
        - alreadySentToday
        - totalSentToday
        - dailyLimit
        - results
      properties:
        sent:
          type: integer
        failed:
          type: integer
        skipped:
          type: integer
        tokensRefreshed:
          type: integer
        total:
          type: integer
        dailyLimitReached:
          type: boolean
        alreadySentToday:
          type: integer
        totalSentToday:
          type: integer
        dailyLimit:
          type: integer
          example: 500
        results:
          type: array
          items:
            $ref: '#/components/schemas/CampaignSendEmailResultItem'
        googleError:
          description: Present when the server could not refresh Google credentials before a send attempt.
          nullable: true
          allOf:
            - $ref: '#/components/schemas/GoogleErrorSummary'

    CampaignSendEmailsResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: 2 email(s) sent, 0 failed, 0 skipped.
        data:
          $ref: '#/components/schemas/CampaignSendEmailsData'

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: OK
          headers:
            X-Response-Time:
              $ref: '#/components/headers/X-Response-Time'
            Server-Timing:
              $ref: '#/components/headers/Server-Timing'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok

  /api/auth/signup:
    post:
      tags: [Auth]
      summary: Register and send OTP email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  description: Normalized by the server (e.g. lowercasing rules from validator).
                password:
                  type: string
                  minLength: 8
                  description: |
                    Required rules: ≥8 characters, at least one uppercase, one lowercase, one digit, and one special character (non-alphanumeric).
                name:
                  type: string
                  maxLength: 200
                profile_pic:
                  type: string
                  maxLength: 2048
                  description: URL or storage reference for profile image.
                address:
                  type: string
                  maxLength: 500
                contact:
                  type: string
                  maxLength: 120
              description: |
                Role is always `user` from signup (`superadmin` is database-only). Ensure DB matches `sql/schema.sql` for profile columns.
      responses:
        '201':
          description: Created; check email for 6-digit OTP.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupResponse'
              example:
                success: true
                message: Account created. Check your email for your 6-digit verification code.
                data:
                  email: hamzaansari6060@gmail.com
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify email OTP and receive tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                  pattern: '^[0-9]{6}$'
                  minLength: 6
                  maxLength: 6
                  description: Six-digit numeric code from email.
      responses:
        '200':
          description: Verified; returns access + refresh tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyOtpResponse'
              example:
                success: true
                message: Email verified successfully.
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                  refreshToken: a1b2c3d4e5f678901234567890abcdef0123456789abcdef0123456789abcd
                  user:
                    id: 11111111-2222-3333-4444-555555555555
                    email: hamzaansari6060@gmail.com
                    isVerified: true
                    createdAt: '2026-05-04T11:44:20.112293+00:00'
                    role: user
                    name: null
                    profilePic: null
                    address: null
                    contact: null
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Already verified or invalid OTP state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  description: Non-empty string (no strength check on login).
            example:
              email: hamzaansari6060@gmail.com
              password: SecureP@ss1
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
              example:
                success: true
                message: Login successful.
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                  refreshToken: a1b2c3d4e5f678901234567890abcdef0123456789abcdef0123456789abcd
                  user:
                    id: 11111111-2222-3333-4444-555555555555
                    email: hamzaansari6060@gmail.com
                    isVerified: true
                    createdAt: '2026-05-04T11:44:20.112293+00:00'
                    role: user
                    name: null
                    profilePic: null
                    address: null
                    contact: null
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Email not verified yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/resend-otp:
    post:
      tags: [Auth]
      summary: Resend verification OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: OTP resent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password-reset OTP by email
      security: []
      description: >-
        Same response for unknown emails (no enumeration). Email is sent only when the account has a password.
        Ensure `otp_codes.purpose` exists (`sql/schema.sql`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Generic acknowledgment (check inbox).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Set new password with email + reset OTP
      security: []
      description: Revokes all refresh sessions then returns new JWT pair (same shape as login).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp, password]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                  pattern: '^[0-9]{6}$'
                password:
                  type: string
                  minLength: 8
                  description: Same strength rules as signup.
      responses:
        '200':
          description: Password updated; new tokens issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '400':
          description: Invalid or expired reset code / weak requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and get new access + refresh pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  description: Opaque refresh token string from prior login/verify/refresh response.
      responses:
        '200':
          description: New tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRefreshResponse'
              example:
                success: true
                message: Tokens refreshed successfully.
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                  refreshToken: b2c3d4e5f678901234567890abcdef0123456789abcdef0123456789abcdef0
        '400':
          description: Missing refresh token in body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or revoked refresh token, or user missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token (optional body)
      description: If `refreshToken` is omitted, the server still returns success but may not revoke a specific session.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /api/auth/logout-all:
    post:
      tags: [Auth]
      summary: Revoke all refresh tokens for the current user
      description: Requires valid access JWT.
      responses:
        '200':
          description: All sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/auth/google:
    get:
      tags: [GoogleAuth]
      summary: Start Google OAuth (redirect or JSON auth URL)
      description: Default returns 302 to Google. Use `?format=json` for `{ authUrl }` (e.g. Swagger). Or use `POST /api/auth/google/token`.
      security: []
      parameters:
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [json]
          description: When `json`, respond with `authUrl` in JSON instead of redirecting.
      responses:
        '302':
          description: Redirect to Google (when `format` is not `json`).
          headers:
            Location:
              description: Google OAuth authorization URL
              schema:
                type: string
                format: uri
        '200':
          description: When `format=json` — open `data.authUrl` in a browser to sign in with Google.
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    required: [authUrl]
                    properties:
                      authUrl:
                        type: string
                        format: uri
                        description: Same URL the 302 redirect would use.
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/google/callback:
    get:
      tags: [GoogleAuth]
      summary: Google OAuth callback (browser redirect flow)
      description: Google redirects here with `?code=` after consent. Returns JSON token payload (not an HTML redirect to your SPA).
      security: []
      parameters:
        - in: query
          name: code
          required: false
          schema:
            type: string
          description: Authorization code from Google (required unless `error` is set).
        - in: query
          name: error
          required: false
          schema:
            type: string
          description: OAuth error code from Google if the user denied access.
      responses:
        '200':
          description: JSON with accessToken, refreshToken, and user (API-style response).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Missing code, Google error query param, or unverified Google email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already registered with a different auth provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/google/token:
    post:
      tags: [GoogleAuth]
      summary: Exchange Google ID token for app JWT pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_token]
              properties:
                id_token:
                  type: string
                  description: Google Sign-In ID token (JWT string from client SDK).
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthGoogleLoginResponse'
              example:
                success: true
                message: Google authentication successful.
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                  refreshToken: c3d4e5f678901234567890abcdef0123456789abcdef0123456789abcdef01
                  user:
                    id: 11111111-2222-3333-4444-555555555555
                    email: user@example.com
                    isVerified: true
                    createdAt: '2026-05-04T11:44:20.112293+00:00'
                    role: user
                    name: Example User
                    profilePic: https://lh3.googleusercontent.com/a/example
                    address: null
                    contact: null
                    authProvider: google
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/auth/google/status:
