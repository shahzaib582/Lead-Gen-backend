services:
  - type: web
    name: leadgen-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production

      - key: REDIS_HOST
        fromService:
          type: redis
          name: leadgen-redis
          property: host

      - key: REDIS_PORT
        fromService:
          type: redis
          name: leadgen-redis
          property: port


  - type: worker
    name: campaign-mail-worker
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/workers/campaignMailWorker.js
    envVars:
      - key: NODE_ENV
        value: production

      - key: REDIS_HOST
        fromService:
          type: redis
          name: leadgen-redis
          property: host

      - key: REDIS_PORT
        fromService:
          type: redis
          name: leadgen-redis
          property: port


  - type: worker
    name: mail-template-worker
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/workers/mailTemplateWorker.js
    envVars:
      - key: NODE_ENV
        value: production

      - key: REDIS_HOST
        fromService:
          type: redis
          name: leadgen-redis
          property: host

      - key: REDIS_PORT
        fromService:
          type: redis
          name: leadgen-redis
          property: port

  - type: redis
    name: leadgen-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all